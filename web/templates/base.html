<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDA – {% block title %}Setup{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; }
    .sidebar { min-height: 100vh; background: #161b22; border-right: 1px solid #30363d; }
    .sidebar .nav-link { color: #c9d1d9; border-radius: 6px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #21262d; color: #58a6ff; }
    .sidebar .nav-link i { width: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .badge-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .ida-logo { font-size: 1.4rem; font-weight: 700; color: #58a6ff; letter-spacing: 2px; }
    .nav-section { font-size: .7rem; color: #484f58; text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar p-3" style="width:220px; flex-shrink:0;">
    <div class="ida-logo mb-4 px-2">⬡ IDA</div>
    <nav class="nav flex-column gap-1">
      <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>

      <div class="nav-section">Konfiguration</div>
      <a class="nav-link {% if request.url.path == '/setup' %}active{% endif %}" href="/setup"><i class="bi bi-gear"></i> Einstellungen</a>
      <a class="nav-link {% if request.url.path == '/google' %}active{% endif %}" href="/google"><i class="bi bi-google"></i> Google Kalender</a>
      <a class="nav-link {% if request.url.path == '/untis' %}active{% endif %}" href="/untis"><i class="bi bi-calendar3-week"></i> WebUntis</a>

      <div class="nav-section">Verwaltung</div>
      <a class="nav-link {% if request.url.path == '/jobs' %}active{% endif %}" href="/jobs"><i class="bi bi-calendar-check"></i> Geplante Tasks</a>
    </nav>
  </div>
  <div class="flex-grow-1 p-4">
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
